<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiya Theme — Investor · Vendor Light</title>
<meta name="robots" content="noindex, nofollow">
<style id="auth-veil">body{visibility:hidden;background:#c8c4bc}</style>
</head>
<body style="background:#c8c4bc;margin:0;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px">
<div style="width:100%;max-width:440px">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#c8c4bc;display:flex;justify-content:center;padding:20px;font-family:'Sora',sans-serif}
.frame{width:393px;background:#FDFAF5;border-radius:47px;overflow:hidden;box-shadow:0 0 0 1px #ccc8c0,0 40px 100px rgba(0,0,0,0.15)}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:20}
.sbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 10px;position:relative;z-index:10}
.sbar-t{font-size:15px;font-weight:600;color:#1a0800;letter-spacing:-0.3px}
.tline{height:2px;background:linear-gradient(90deg,#FF6B35,#FFB347,#FF6B35)}
.hdr{padding:20px 28px 8px;display:flex;align-items:flex-end;justify-content:space-between}
.big-section{padding:28px 28px 24px}
.big-label{font-size:10px;color:rgba(0,0,0,0.2);letter-spacing:3px;font-family:'DM Mono',monospace;margin-bottom:10px}
.big-number{font-size:72px;font-weight:700;color:#1a0800;letter-spacing:-4px;line-height:1}
.hr{height:1px;background:rgba(0,0,0,0.06);margin:0 28px}
.trio{display:flex;padding:20px 28px}
.trio-item{flex:1;position:relative}
.trio-item:not(:last-child)::after{content:'';position:absolute;right:0;top:4px;bottom:4px;width:1px;background:rgba(0,0,0,0.07)}
.trio-val{font-size:22px;font-weight:600;color:#1a0800;letter-spacing:-1px}
.trio-val.o{color:#FF6B35}
.trio-lbl{font-size:9px;color:rgba(0,0,0,0.28);margin-top:4px;letter-spacing:1px;font-family:'DM Mono',monospace}
.sec-label{padding:4px 28px 10px;font-size:9px;color:rgba(0,0,0,0.2);letter-spacing:3px;font-family:'DM Mono',monospace}
.route{padding:0 20px;display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.ri{display:flex;align-items:center;gap:14px;padding:12px 8px;border-radius:12px}
.ri.now{background:rgba(255,107,53,0.05);border:1px solid rgba(255,107,53,0.15)}
.ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ri-name{font-size:14px;font-weight:500;flex:1;letter-spacing:-0.2px}
.ri-meta{font-size:10px;font-family:'DM Mono',monospace}
.bnav{padding:12px 36px 36px;display:flex;justify-content:space-between;align-items:center}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0.22}
.ni.on{opacity:1}
.ni-l{font-size:9px;letter-spacing:0.5px;font-family:'DM Mono',monospace}
.ni.on .ni-l{color:#FF6B35}
@keyframes vb{0%,100%{transform:translate(0,0)}15%{transform:translate(-1.5px,1px)}30%{transform:translate(0,2.2px)}45%{transform:translate(1.5px,1px)}60%{transform:translate(0,0)}}
@keyframes sl{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}75%{transform:rotate(14deg)}}
@keyframes sr{0%,100%{transform:rotate(0)}25%{transform:rotate(14deg)}75%{transform:rotate(-14deg)}}
</style>
<div class="body">
<div class="frame" style="position:relative">
  <div class="island"></div>
  <div class="sbar">
    <div class="sbar-t">9:41</div>
    <div style="display:flex;gap:5px;align-items:center">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#1a0800" opacity="0.5"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1a0800" stroke-opacity="0.25"/><rect x="2" y="2" width="17" height="8" rx="2" fill="#1a0800" fill-opacity="0.5"/></svg>
    </div>
  </div>
  <div class="tline"></div>
  <div class="hdr">
    <div>
      <div style="font-size:11px;color:rgba(255,107,53,0.45);letter-spacing:3px;font-family:'DM Mono',monospace;margin-bottom:5px">DAWN · 6:48 AM</div>
      <div style="font-size:22px;font-weight:600;color:#1a0800;letter-spacing:-0.5px">Ramesh</div>
    </div>
    <svg width="64" height="20" viewBox="0 0 64 20" fill="none">
      <text x="1" y="16" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#1a0800" letter-spacing="-0.6">th</text>
      <g transform="translate(20,0)">
        <path d="M0,6.4 L2.8,6.4 L2.8,10.2 L1.4,13.1 L0,10.2 Z" fill="#FF6B35"/>
        <g style="animation:sl 1.2s ease-in-out infinite;transform-origin:0.5px 13.1px"><line x1="0.5" y1="13.1" x2="0" y2="16" stroke="#FF6B35" stroke-width="0.8" stroke-linecap="round"/></g>
        <g style="animation:sr 1.2s ease-in-out infinite;transform-origin:2.3px 13.1px"><line x1="2.3" y1="13.1" x2="2.8" y2="16" stroke="#FF6B35" stroke-width="0.8" stroke-linecap="round"/></g>
        <g style="animation:vb 3s ease-in-out infinite"><circle cx="1.4" cy="3.4" r="2" fill="#FF6B35"/><circle cx="0.7" cy="3" r="0.36" fill="#fff"/><circle cx="2.1" cy="3" r="0.36" fill="#fff"/></g>
      </g>
      <text x="25" y="16" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#1a0800" letter-spacing="-0.6">ya</text>
    </svg>
  </div>
  <div class="big-section">
    <div class="big-label">DELIVERIES TODAY</div>
    <div style="display:flex;align-items:flex-end;gap:8px">
      <div class="big-number">39</div>
      <div style="padding-bottom:12px">
        <div style="font-size:16px;color:rgba(0,0,0,0.2);font-weight:300">/ 42</div>
        <div style="font-size:11px;color:#FF6B35;font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:2px">93%</div>
      </div>
    </div>
    <div style="font-size:13px;color:rgba(0,0,0,0.3);margin-top:8px">3 remaining · <span style="color:#FF6B35">est. 35 min</span> · Route B</div>
  </div>
  <div class="hr"></div>
  <div class="trio">
    <div class="trio-item" style="padding-right:20px"><div class="trio-val o">₹4.2K</div><div class="trio-lbl">Collected</div></div>
    <div class="trio-item" style="padding:0 20px"><div class="trio-val">₹680</div><div class="trio-lbl">Pending</div></div>
    <div class="trio-item" style="padding-left:20px"><div class="trio-val">4.9★</div><div class="trio-lbl">Rating</div></div>
  </div>
  <div class="hr"></div>
  <div class="sec-label" style="margin-top:12px">ROUTE</div>
  <div class="route">
    <div class="ri"><div class="ri-dot" style="background:#22c55e;opacity:0.6"></div><div class="ri-name" style="color:rgba(0,0,0,0.3)">Rajesh S.</div><div class="ri-meta" style="color:rgba(0,0,0,0.2)">Done · 6:30</div></div>
    <div class="ri now"><div class="ri-dot" style="background:#FF6B35"></div><div class="ri-name" style="color:#1a0800;font-weight:600">Amit K.</div><div style="font-size:12px;background:#FF6B35;color:#fff;padding:4px 12px;border-radius:8px;font-weight:600">Go →</div></div>
    <div class="ri"><div class="ri-dot" style="background:rgba(0,0,0,0.12)"></div><div class="ri-name" style="color:rgba(0,0,0,0.25)">Sunita K.</div><div class="ri-meta" style="color:rgba(0,0,0,0.18)">7:15 · 0.8 km</div></div>
  </div>
  <div class="hr"></div>
  <div class="bnav">
    <div class="ni on"><div style="width:5px;height:5px;border-radius:50%;background:#FF6B35"></div><div class="ni-l" style="color:#FF6B35">Home</div></div>
    <div class="ni"><div style="width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.15)"></div><div class="ni-l" style="color:rgba(0,0,0,0.3)">Orders</div></div>
    <div class="ni"><div style="width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.15)"></div><div class="ni-l" style="color:rgba(0,0,0,0.3)">Customers</div></div>
    <div class="ni"><div style="width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.15)"></div><div class="ni-l" style="color:rgba(0,0,0,0.3)">Account</div></div>
  </div>
</div>
</div>

</div>
<script>
(function() {
  var veil = document.getElementById('auth-veil');
  if (sessionStorage.getItem('thiya_dev_session') === '1') {
    veil.remove();
  } else {
    veil.textContent = 'body{margin:0;background:#c8c4bc;font-family:sans-serif}';
    document.addEventListener('DOMContentLoaded', function() {
      document.body.innerHTML =
        '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px;text-align:center;width:100%">' +
          '<div>' +
            '<div style="width:52px;height:52px;background:#FF6B35;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;margin-bottom:20px">th</div>' +
            '<h2 style="color:#fff;font-size:22px;font-weight:700;margin-bottom:10px">Restricted Access</h2>' +
            '<p style="color:#aaa;font-size:14px;line-height:1.7;max-width:300px">This resource is only accessible through the Thiya Developer Portal.</p>' +
          '</div>' +
          '<a href="developer.html" style="display:inline-block;background:#FF6B35;color:#fff;text-decoration:none;padding:13px 28px;border-radius:8px;font-size:14px;font-weight:600">Go to Developer Portal &rarr;</a>' +
        '</div>';
    });
  }
})();
</script>
</body>
</html>
