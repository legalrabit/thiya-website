<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiya Theme — Investor · Consumer Light</title>
<meta name="robots" content="noindex, nofollow">
<style id="auth-veil">body{visibility:hidden;background:#c4c6d8}</style>
</head>
<body style="background:#c4c6d8;margin:0;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px">
<div style="width:100%;max-width:440px">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#c4c6d8;display:flex;justify-content:center;padding:20px;font-family:'Sora',sans-serif}
.frame{width:393px;background:#F2F4F8;border-radius:47px;overflow:hidden;box-shadow:0 0 0 1px #b0b4c8,0 40px 100px rgba(0,0,0,0.12)}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:20}
.sbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 10px;position:relative;z-index:10}
.sbar-t{font-size:15px;font-weight:600;color:#1a1a2e}
.tline{height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,0.5),rgba(129,140,248,0.3),transparent)}
.hr{height:1px;background:rgba(99,102,241,0.07);margin:0 28px}
.trio{display:flex;padding:20px 28px}
.trio-item{flex:1;position:relative}
.trio-item:not(:last-child)::after{content:'';position:absolute;right:0;top:4px;bottom:4px;width:1px;background:rgba(99,102,241,0.1)}
.sec-label{padding:4px 28px 10px;font-size:9px;color:rgba(0,0,0,0.2);letter-spacing:3px;font-family:'DM Mono',monospace}
.bnav{padding:12px 36px 36px;display:flex;justify-content:space-between;align-items:center}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0.22}
.ni.on{opacity:1}
.ni-l{font-size:9px;letter-spacing:0.5px;font-family:'DM Mono',monospace;color:rgba(0,0,0,0.3)}
.ni.on .ni-l{color:#5558e8}
@keyframes vb{0%,100%{transform:translate(0,0)}15%{transform:translate(-1.5px,1px)}30%{transform:translate(0,2.2px)}45%{transform:translate(1.5px,1px)}60%{transform:translate(0,0)}}
@keyframes sl{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}75%{transform:rotate(14deg)}}
@keyframes sr{0%,100%{transform:rotate(0)}25%{transform:rotate(14deg)}75%{transform:rotate(-14deg)}}
</style>
<div class="body">
<div class="frame" style="position:relative">
  <div class="island"></div>
  <div class="sbar"><div class="sbar-t">9:41</div><div style="display:flex;gap:5px"><svg width="17" height="12" viewBox="0 0 17 12" fill="#1a1a2e" opacity="0.45"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg><svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1a1a2e" stroke-opacity="0.22"/><rect x="2" y="2" width="17" height="8" rx="2" fill="#1a1a2e" fill-opacity="0.45"/></svg></div></div>
  <div class="tline"></div>

  <div style="padding:20px 28px 8px;display:flex;align-items:flex-end;justify-content:space-between">
    <div>
      <div style="font-size:11px;color:rgba(99,102,241,0.45);letter-spacing:3px;font-family:'DM Mono',monospace;margin-bottom:5px">GOOD MORNING</div>
      <div style="font-size:22px;font-weight:600;color:#1a1a2e;letter-spacing:-0.5px">Abhash</div>
    </div>
    <svg width="64" height="20" viewBox="0 0 64 20" fill="none">
      <text x="1" y="16" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#1a1a2e" letter-spacing="-0.6">th</text>
      <g transform="translate(20,0)">
        <path d="M0,6.4 L2.8,6.4 L2.8,10.2 L1.4,13.1 L0,10.2 Z" fill="#FF6B35"/>
        <g style="animation:sl 1.2s ease-in-out infinite;transform-origin:0.5px 13.1px"><line x1="0.5" y1="13.1" x2="0" y2="16" stroke="#FF6B35" stroke-width="0.8" stroke-linecap="round"/></g>
        <g style="animation:sr 1.2s ease-in-out infinite;transform-origin:2.3px 13.1px"><line x1="2.3" y1="13.1" x2="2.8" y2="16" stroke="#FF6B35" stroke-width="0.8" stroke-linecap="round"/></g>
        <g style="animation:vb 3s ease-in-out infinite"><circle cx="1.4" cy="3.4" r="2" fill="#FF6B35"/><circle cx="0.7" cy="3" r="0.36" fill="#fff"/><circle cx="2.1" cy="3" r="0.36" fill="#fff"/></g>
      </g>
      <text x="25" y="16" font-family="'Sora',sans-serif" font-weight="700" font-size="14" fill="#1a1a2e" letter-spacing="-0.6">ya</text>
    </svg>
  </div>

  <!-- Big number -->
  <div style="padding:28px 28px 24px">
    <div style="font-size:10px;color:rgba(0,0,0,0.2);letter-spacing:3px;font-family:'DM Mono',monospace;margin-bottom:10px">ACTIVE SERVICES</div>
    <div style="display:flex;align-items:flex-end;gap:10px">
      <div style="font-size:72px;font-weight:700;color:#1a1a2e;letter-spacing:-4px;line-height:1">3</div>
      <div style="padding-bottom:12px">
        <div style="font-size:14px;color:rgba(0,0,0,0.22);font-weight:300">deliveries</div>
        <div style="font-size:11px;color:#5558e8;font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:2px">on the way</div>
      </div>
    </div>
    <div style="font-size:13px;color:rgba(0,0,0,0.28);margin-top:8px">Next in <span style="color:#5558e8">8 min</span> · All on time</div>
  </div>

  <div class="hr"></div>

  <div class="trio">
    <div class="trio-item" style="padding-right:20px"><div style="font-size:22px;font-weight:600;color:#FF6B35;letter-spacing:-1px">₹2.4K</div><div style="font-size:9px;color:rgba(0,0,0,0.25);margin-top:4px;letter-spacing:1px;font-family:'DM Mono',monospace">This Week</div></div>
    <div class="trio-item" style="padding:0 20px"><div style="font-size:22px;font-weight:600;color:#1a1a2e;letter-spacing:-1px">12</div><div style="font-size:9px;color:rgba(0,0,0,0.25);margin-top:4px;letter-spacing:1px;font-family:'DM Mono',monospace">Active</div></div>
    <div class="trio-item" style="padding-left:20px"><div style="font-size:22px;font-weight:600;color:#5558e8;letter-spacing:-1px">4.9★</div><div style="font-size:9px;color:rgba(0,0,0,0.25);margin-top:4px;letter-spacing:1px;font-family:'DM Mono',monospace">Rating</div></div>
  </div>

  <div class="hr"></div>

  <div class="sec-label" style="margin-top:12px">YOUR SERVICES</div>
  <div style="padding:0 20px 20px;display:flex;flex-direction:column;gap:2px">
    <div style="display:flex;align-items:center;gap:14px;padding:12px 8px;border-radius:12px;background:rgba(99,102,241,0.05);border:1px solid rgba(99,102,241,0.12)">
      <div style="width:6px;height:6px;border-radius:50%;background:#5558e8;flex-shrink:0"></div>
      <div style="font-size:14px;color:#1a1a2e;font-weight:500;flex:1">Morning Milk</div>
      <div style="font-size:10px;color:#5558e8;font-family:'DM Mono',monospace">in 8 min</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;padding:12px 8px;border-radius:12px">
      <div style="width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.12);flex-shrink:0"></div>
      <div style="font-size:14px;color:rgba(0,0,0,0.38);font-weight:500;flex:1">Lunch Tiffin</div>
      <div style="font-size:10px;color:rgba(0,0,0,0.22);font-family:'DM Mono',monospace">12:30 PM</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;padding:12px 8px;border-radius:12px">
      <div style="width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.08);flex-shrink:0"></div>
      <div style="font-size:14px;color:rgba(0,0,0,0.25);font-weight:500;flex:1">Water Cans</div>
      <div style="font-size:10px;color:rgba(0,0,0,0.18);font-family:'DM Mono',monospace">Tomorrow</div>
    </div>
  </div>

  <div class="hr"></div>
  <div class="bnav">
    <div class="ni on"><div style="width:5px;height:5px;border-radius:50%;background:#5558e8"></div><div class="ni-l">Home</div></div>
    <div class="ni"><div style="width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.15)"></div><div class="ni-l">Orders</div></div>
    <div class="ni"><div style="width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.15)"></div><div class="ni-l">Discover</div></div>
    <div class="ni"><div style="width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.15)"></div><div class="ni-l">Account</div></div>
  </div>
</div>
</div>

</div>
<script>
(function() {
  var veil = document.getElementById('auth-veil');
  if (sessionStorage.getItem('thiya_dev_session') === '1') {
    veil.remove();
  } else {
    veil.textContent = 'body{margin:0;background:#c4c6d8;font-family:sans-serif}';
    document.addEventListener('DOMContentLoaded', function() {
      document.body.innerHTML =
        '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px;text-align:center;width:100%">' +
          '<div>' +
            '<div style="width:52px;height:52px;background:#FF6B35;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;margin-bottom:20px">th</div>' +
            '<h2 style="color:#fff;font-size:22px;font-weight:700;margin-bottom:10px">Restricted Access</h2>' +
            '<p style="color:#aaa;font-size:14px;line-height:1.7;max-width:300px">This resource is only accessible through the Thiya Developer Portal.</p>' +
          '</div>' +
          '<a href="developer.html" style="display:inline-block;background:#FF6B35;color:#fff;text-decoration:none;padding:13px 28px;border-radius:8px;font-size:14px;font-weight:600">Go to Developer Portal &rarr;</a>' +
        '</div>';
    });
  }
})();
</script>
</body>
</html>
